services:
  api:
    build: .
    container_name: training-api
    ports:
      - "8080:8080"
    env_file:
      - app.env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
    volumes:
      - ./uploads:/app/uploads
      - ./service-account.json:/app/service-account.json:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: training-db
    environment:
      MYSQL_DATABASE: training_plan_db
      MYSQL_USER: training_user
      MYSQL_PASSWORD: training_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
